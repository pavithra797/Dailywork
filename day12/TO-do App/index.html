<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TODO App</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <h2>TODO App</h2>
    <div class="app">
        <input type="text" id="todo-input" placeholder="Enter task" />
        <input type="datetime-local" id="task-datetime">
        <p id="error-msg" class="error"></p>
        <div>
            <input type="radio" name="priority" value="urgent"> Urgent
            <input type="radio" name="priority" value="not-urgent" checked> Not Urgent
        </div>
        <button class="add-btn" onclick="addTodo()">Add</button>
        <button class="sort-btn" onclick="sortTodos()">Sort</button>

        <ul id="todo-list"></ul>
    </div>

    <script src="script.js"></script>
</body>

</html>
